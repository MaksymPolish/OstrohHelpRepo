<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="OstrohHelp - вебзастосунок для допомоги студентам"
    />
    <title>OstrohHelp</title>
    <script>
      // Застосувати тему ДО загрузки React додатку
      (function() {
        const initStartTime = performance.now();
        console.log(`[THEME] [${initStartTime.toFixed(2)}ms] Starting theme initialization`);
        
        try {
          const savedDarkMode = localStorage.getItem("darkMode");
          const checkTime = performance.now();
          console.log(`[STORAGE] [${checkTime.toFixed(2)}ms] Read localStorage (+${(checkTime - initStartTime).toFixed(2)}ms)`);
          
          if (savedDarkMode === "true") {
            document.documentElement.classList.add("dark");
            const applyTime = performance.now();
            console.log(`[DARK_MODE] [${applyTime.toFixed(2)}ms] Applied dark theme before React load (+${(applyTime - initStartTime).toFixed(2)}ms)`);
          } else {
            document.documentElement.classList.remove("dark");
            const applyTime = performance.now();
            console.log(`[LIGHT_MODE] [${applyTime.toFixed(2)}ms] Applied light theme before React load (+${(applyTime - initStartTime).toFixed(2)}ms)`);
          }
        } catch (e) {
          console.warn("[ERROR] Error reading localStorage:", e);
        }
      })();
    </script>
  </head>
  <body>
    <noscript>Вам потрібно увімкнути JavaScript для роботи цього додатку.</noscript>
    <div id="root"></div>
    <script>
      // Очистити весь кеш при завантаженні
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          registrations.forEach(reg => reg.unregister());
        });
      }
    </script>
  </body>
</html>
