name: Security Tests via Docker

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ostrohelpuser
          POSTGRES_PASSWORD: OstroHelpPass123!
          POSTGRES_DB: ostrohelpdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Run Security Tests
      run: |
        dotnet test tests/Tests.Common/Tests.Common.csproj \
          --configuration Release \
          --logger "trx;LogFileName=security-tests.trx" \
          --results-directory ./test-results \
          --no-restore \
          --no-build \
          --verbosity normal
    
    - name: Publish Test Results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: test-results/**/*.trx
        check_name: Security Tests Results
        
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: test-results/
        retention-days: 30

  docker-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Security Tests Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.tests
        target: security-tests
        load: true
        tags: ostrohelpapi:security-tests
    
    - name: Run Security Tests Container
      run: |
        docker run --rm \
          -v ${{ github.workspace }}/test-results:/testresults \
          ostrohelpapi:security-tests
    
    - name: Upload Docker Test Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: docker-test-results
        path: test-results/
        retention-days: 30

  build-docker-image:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build API Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        target: api-runtime
        load: true
        tags: ostrohelpapi:latest
    
    - name: Test API Image
      run: |
        docker run --rm \
          -e ASPNETCORE_ENVIRONMENT=Testing \
          ostrohelpapi:latest \
          --help
